# 部署 web/ 到 GitHub Pages：push main 即自动构建发布。
# 站点地址：https://xinster819.github.io/reward-stars/
# 注：VITE_SUPABASE_* 是浏览器端公开配置（publishable key 本就可公开，数据靠 RLS 保护），直接写在这。
name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
        env:
          BASE_PATH: /reward-stars/
          VITE_SUPABASE_URL: https://znxqlxxrqtajlaefiwnw.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_upkygt4UB4Aun3n_9cMmsQ_lp98y6gW
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - id: deployment
        uses: actions/deploy-pages@v4
